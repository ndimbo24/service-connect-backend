spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL}}
    username: ${DB_USERNAME:${SPRING_DATASOURCE_USERNAME}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:10}
      minimum-idle: ${DB_MIN_IDLE:2}
      connection-timeout: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
logging:
  level:
    root: INFO
    com.serviceconnect: INFO
    org.springframework.security: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
app:
  base-url: ${BASE_URL:https://web-production-0517f.up.railway.app}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${FRONTEND_URL:https://web-production-0517f.up.railway.app}}
  jwt:
    secret: ${JWT_SECRET}
    expiration: 86400000
pesapal:
  consumer-key: ${PESAPAL_CONSUMER_KEY}
  consumer-secret: ${PESAPAL_CONSUMER_SECRET}
  base-url: ${PESAPAL_BASE_URL:https://pay.pesapal.com/v3}
  ipn-id: ${PESAPAL_IPN_ID:d7b419dd-7669-4129-9bc5-da6f9c38a592}
  ipn-url: ${PESAPAL_IPN_URL:${BASE_URL:https://web-production-0517f.up.railway.app}/api/payments/webhook}
  callback-url: ${PESAPAL_CALLBACK_URL:${FRONTEND_URL:https://web-production-0517f.up.railway.app}/payment/callback}
  registration-fee-amount: ${PESAPAL_REGISTRATION_FEE_AMOUNT:10000.0}
  monthly-subscription-amount: ${PESAPAL_MONTHLY_SUBSCRIPTION_AMOUNT:5000.0}
