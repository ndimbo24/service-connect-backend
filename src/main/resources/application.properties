# ===========================
# Application Configuration
# ===========================
spring.application.name=service-connect-hub

# ===========================
# Server Configuration
# ===========================
server.port=${PORT:8080}

# ===========================
# PostgreSQL Configuration
# Local defaults. In production set DB_URL, DB_USERNAME, and DB_PASSWORD.
spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/serviceconnect}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:postgres}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000


# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema/account-status-fix.sql,classpath:db/schema/technician-payments.sql,classpath:db/schema/technician-payments-alter.sql,classpath:db/schema/location-system-migration.sql
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration=86400000
# 24 hours in milliseconds

# ===========================
# CORS Configuration
# ===========================
app.base-url=${BASE_URL:https://web-production-0517f.up.railway.app}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,https://web-production-0517f.up.railway.app}}

# ===========================
# Logging
# ===========================
logging.level.com.serviceconnect=DEBUG
logging.level.org.springframework.security=INFO

# ===========================
# Pesapal Configuration
# ===========================
pesapal.consumer-key=${PESAPAL_CONSUMER_KEY:}
pesapal.consumer-secret=${PESAPAL_CONSUMER_SECRET:}
pesapal.base-url=${PESAPAL_BASE_URL:https://pay.pesapal.com/v3}
pesapal.ipn-id=${PESAPAL_IPN_ID:d7b419dd-7669-4129-9bc5-da6f9c38a592}
pesapal.ipn-url=${PESAPAL_IPN_URL:${BASE_URL:https://web-production-0517f.up.railway.app}/api/payments/webhook}
pesapal.callback-url=${PESAPAL_CALLBACK_URL:${FRONTEND_URL:https://web-production-0517f.up.railway.app}/payment/callback}
pesapal.registration-fee-amount=${PESAPAL_REGISTRATION_FEE_AMOUNT:10000.0}
pesapal.monthly-subscription-amount=${PESAPAL_MONTHLY_SUBSCRIPTION_AMOUNT:5000.0}

# ===========================
# Actuator / Cloud Health
# ===========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
